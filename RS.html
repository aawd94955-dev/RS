<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — RS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="RS.css">
</head>
<body>

  <div class="scene">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="wrapper">
    <div class="card">
      <div class="left">
        <img class="left-img" src="images/banner.jpg" alt="banner">
        <div class="left-deco">
          <svg viewBox="0 0 396 580" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="198" cy="290" r="160" stroke="rgba(58,92,245,0.07)" stroke-width="1" fill="none"/>
            <circle cx="198" cy="290" r="120" stroke="rgba(58,92,245,0.06)" stroke-width="1" fill="none"/>
            <circle cx="198" cy="290" r="80"  stroke="rgba(58,92,245,0.08)" stroke-width="1" fill="none"/>
            <path d="M-20 200 Q 100 120 220 240 Q 330 340 440 220" stroke="rgba(58,92,245,0.1)" stroke-width="1.5" fill="none"/>
            <path d="M-20 260 Q 110 170 230 300 Q 340 400 450 270" stroke="rgba(58,92,245,0.06)" stroke-width="1" fill="none"/>
            <circle cx="198" cy="290" r="5"   fill="rgba(58,92,245,0.25)"/>
            <circle cx="198" cy="290" r="2.5" fill="rgba(58,92,245,0.6)"/>
            <circle cx="80"  cy="140" r="2"   fill="rgba(58,92,245,0.15)"/>
            <circle cx="310" cy="180" r="1.5" fill="rgba(58,92,245,0.12)"/>
            <circle cx="140" cy="430" r="2"   fill="rgba(58,92,245,0.12)"/>
            <circle cx="290" cy="400" r="1.5" fill="rgba(58,92,245,0.1)"/>
          </svg>
        </div>
      </div>
      
      <div class="right">

        <img class="logo" src="images/logo.png" alt="logo">

        <div class="title">로그인</div>
        <div class="subtitle">계정에 오신 것을 환영합니다</div>

        <div class="social-row">
          <button class="social-btn">
            <svg width="16" height="16" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google로 로그인
          </button>
          <button class="social-btn rs">
            <div class="rs-icon">RS</div>
            RS 계정으로 로그인
          </button>
        </div>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">or</span>
          <div class="divider-line"></div>
        </div>

        <div class="form-group">
          <input type="email" class="form-input" placeholder="이메일 주소">
        </div>

        <div class="form-group pw-wrap">
          <input type="password" class="form-input" id="pw" placeholder="비밀번호">
          <button class="pw-toggle" id="pw-toggle" tabindex="-1">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <div class="forgot"><a href="#">비밀번호를 잊으셨나요?</a></div>

        <button class="btn-primary">로그인</button>

        <div class="footer-text">계정이 없으신가요? <a href="#">회원가입</a></div>
      </div>

    </div>
  </div>

  <script src="RS.js"></script>
</body>
</html>
